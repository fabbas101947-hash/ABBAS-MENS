<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abbas Men | Login</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181c24;
      --line: #2b313d;
      --text: #f5f6f7;
      --muted: #a8b0bf;
      --accent: #d4a453;
      --accent-hover: #bf903f;
      --input: #12161d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(7, 9, 13, 0.82), rgba(7, 9, 13, 0.9)),
        url("BLACK_1.jpg") center/cover no-repeat;
    }

    .login-card {
      width: min(420px, 100%);
      background: rgba(24, 28, 36, 0.95);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 30px 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: #0c0f14;
      margin-bottom: 10px;
    }

    .brand h1 {
      font-size: 1.5rem;
      letter-spacing: 0.1rem;
      font-weight: 700;
    }

    .brand p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #d8dce4;
    }

    .field input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--input);
      color: var(--text);
      padding: 0 14px;
      font-size: 0.95rem;
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212, 164, 83, 0.2);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0 18px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .remember input {
      accent-color: var(--accent);
    }

    .meta a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .meta a:hover {
      color: #e5b86b;
    }

    .btn {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #161616;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .signup {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .feedback {
      min-height: 20px;
      margin-top: 10px;
      font-size: 0.88rem;
      font-weight: 600;
    }

    .signup a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 430px) {
      .login-card {
        padding: 24px 18px;
      }

      .brand h1 {
        font-size: 1.35rem;
      }
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <img src="ABBAS MEN Logo.png" alt="Abbas Men logo" />
      <h1>ABBAS MEN</h1>
      <p>Sign in to your account</p>
    </div>

    <form id="loginForm" action="#" method="post" novalidate>
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>

      <div class="meta">
        <label class="remember" for="remember">
          <input type="checkbox" id="remember" name="remember" />
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn" type="submit">LOGIN</button>
      <p class="feedback" id="feedback" aria-live="polite"></p>
      <p class="signup">New to Abbas Men? <a href="create-account.html">Create account</a></p>
    </form>
  </main>
  <script>
    const loginForm = document.getElementById("loginForm");
    const feedback = document.getElementById("feedback");

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const validEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      const validPassword = password.length >= 6;

      if (!validEmail || !validPassword) {
        feedback.textContent = "Enter a valid email and password (minimum 6 characters).";
        feedback.style.color = "#ff7b7b";
        return;
      }

      feedback.textContent = "Login successful. Redirecting...";
      feedback.style.color = "#8de1b8";
      window.location.href = "home.html";
    });
  </script>
</body>
</html>
